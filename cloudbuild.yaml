######################################
## Cloud Build Deployment Pipeline  ##
######################################
#
# Triggered on every push to main (i.e. when a PR is merged).
# Update the trigger at:
# https://console.cloud.google.com/cloud-build/triggers;region=us-central1/edit/2bd8fcc6-6319-455d-88f2-38d564fe2db8?project=httparchive
#
# The deploy version is a UTC timestamp generated at deploy time (e.g. 20211111t105151).

substitutions:
  # Update when a new Prince version is released: https://www.princexml.com/latest/
  # ubuntu:24.04 is Ubuntu Noble (24.04 LTS); use the ubuntu24.04 package.
  _PRINCE_PACKAGE: 'prince_16.2-1_ubuntu24.04_amd64.deb'

steps:
  # ─────────────────────────────────────────────────────────────────────────
  # Step 1: Install dependencies, generate chapters, run tests, build ebooks.
  # Prince fetches pages from a running localhost server.
  # ─────────────────────────────────────────────────────────────────────────
  - name: 'ubuntu:24.04'
    id: 'build-test-and-ebooks'
    entrypoint: 'bash'
    dir: 'src'
    args:
      - '-c'
      - |
        set -e
        apt-get update -qq
        apt-get install -y python3 python3-pip python-is-python3 curl

        # Install Node.js 20
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs

        # Generate chapters, run tests (installs Python/Node deps, starts server)
        # PIP_BREAK_SYSTEM_PACKAGES=1 is required on Ubuntu 24.04 (PEP 668) since
        # we're intentionally installing into the system Python in a throwaway container.
        PIP_BREAK_SYSTEM_PACKAGES=1 ./tools/scripts/run_and_test_website.sh

        # Enable Ubuntu universe repository (required for fonts and pdftk)
        apt-get install -y software-properties-common
        add-apt-repository -y universe
        apt-get update -qq

        # Install CJK fonts for multilingual ebooks
        apt-get install -y fonts-ipafont-gothic fonts-arphic-uming fonts-unfonts-core wget

        # Install pdftk (ebook post-processing)
        apt-get install -y pdftk gdebi-core

        # Download and install Prince PDF generator (gdebi auto-resolves dependencies)
        wget -q "https://www.princexml.com/download/${_PRINCE_PACKAGE}" -P /tmp
        gdebi --non-interactive "/tmp/${_PRINCE_PACKAGE}"

        # Generate PDF ebooks
        mkdir -p static/pdfs
        npm run ebooks

        # Update static-asset cache-busting hashes (run after all files are generated)
        npm run timestamps

  # ─────────────────────────────────────────────────────────────────────────
  # Step 2: Deploy to Google App Engine.
  # app.yaml is read from /workspace/src (dir: src).
  # App Engine version is a timestamp, e.g. 20211111t105151.
  # ─────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'bash'
    dir: 'src'
    args:
      - '-c'
      - |
        set -e
        VERSION=$(date -u +'%Y%m%dt%H%M%S')
        gcloud app deploy \
          --project webalmanac \
          --version="$$VERSION" \
          --stop-previous-version \
          --quiet

  # ─────────────────────────────────────────────────────────────────────────
  # Step 4: Upload generated ebooks to GCS.
  # Uses nullglob so missing PDFs produce a warning rather than an error.
  # ─────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'upload-ebooks'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        shopt -s nullglob
        pdfs=(/workspace/src/static/pdfs/web_almanac_*.pdf)
        if [[ ${#pdfs[@]} -gt 0 ]]; then
          gsutil -m cp "${pdfs[@]}" gs://httparchive/almanac/ebooks/
          echo "Uploaded ${#pdfs[@]} PDF(s) to GCS"
        else
          echo "Warning: no ebooks found to upload"
        fi

# Total timeout covers: ~10 min build/test + ~30 min ebook generation +
# ~10 min deploy + ~5 min GCS upload.
timeout: '3600s'

options:
  logging: CLOUD_LOGGING_ONLY
